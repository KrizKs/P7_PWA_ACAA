<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas ESCOM - PWA</title>
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004b93">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1944/1944200.png">
</head>
</head>
<body>
    <header>
        <h1>ESCOM | Sistema de Reservaciones</h1>
        <p>Arquitectura Basada en Servicios Web</p>
    </header>

    <main id="app-container">
        <section id="pantalla-menu" class="pantalla activa">
            <h2>Seleccione una operación</h2>
            <div class="botones-menu">
                <button onclick="mostrarPantalla('pantalla-consulta')" class="btn-primario">Ver Disponibilidad</button>
                <button onclick="prepararFormulario('RESERVAR')" class="btn-primario">Realizar Reserva</button>
                <button onclick="prepararFormulario('CANCELAR')" class="btn-secundario">Cancelar Reserva</button>
            </div>
        </section>

        <section id="pantalla-consulta" class="pantalla oculta">
            <h2>Consulta de Disponibilidad</h2>
            <div class="controles">
                <select id="sel-sala-consulta"></select>
                <select id="sel-dia-consulta">
                    <option value="0">Lunes</option>
                    <option value="1">Martes</option>
                    <option value="2">Miércoles</option>
                    <option value="3">Jueves</option>
                    <option value="4">Viernes</option>
                </select>
                <select id="sel-hora-consulta">
                    </select>
                <button onclick="consultarMapa()" class="btn-primario">Buscar</button>
            </div>
            
            <div id="mapa-container" class="oculta">
                <div class="leyenda">
                    <span class="seat libre-ejemplo">Libre</span>
                    <span class="seat ocupado-ejemplo">Ocupado</span>
                </div>
                <div id="grid-asientos" class="grid"></div>
            </div>
            <button onclick="mostrarPantalla('pantalla-menu')" class="btn-volver mt-2">Volver al Menú</button>
        </section>

        <section id="pantalla-formulario" class="pantalla oculta">
            <h2 id="titulo-formulario">Gestión</h2>
            <form id="form-gestion" onsubmit="enviarGestion(event)">
                <input type="hidden" id="input-accion">
                
                <label>Sala:</label>
                <select id="sel-sala-form" required></select>

                <label>Asiento (1-36):</label>
                <input type="number" id="input-asiento" min="1" max="36" required>

                <label>Día:</label>
                <select id="sel-dia-form" required>
                    <option value="0">Lunes</option><option value="1">Martes</option>
                    <option value="2">Miércoles</option><option value="3">Jueves</option>
                    <option value="4">Viernes</option>
                </select>

                <label>Hora de Inicio:</label>
                <select id="sel-hora-form" required></select>

                <label>Duración (horas):</label>
                <input type="number" id="input-duracion" min="1" max="4" required>

                <button type="submit" class="btn-primario mt-2">Confirmar Acción</button>
            </form>
            <button onclick="mostrarPantalla('pantalla-menu')" class="btn-volver mt-2">Volver al Menú</button>
        </section>
        <div id="modal-alerta" class="modal oculta">
            <div class="modal-contenido">
                <span class="cerrar-modal" onclick="cerrarAlerta()">&times;</span>
                <h3 id="modal-titulo">Notificación</h3>
                <p id="modal-mensaje" class="mt-2"></p>
                <button onclick="cerrarAlerta()" class="btn-primario mt-2">Aceptar</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
